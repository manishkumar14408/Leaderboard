<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Leaderboard</title>
  <style>
    :root {
      --tesco-blue: #00539f;
      --tesco-red: #ee1c2e;
      --bg-1: #07162f;
      --bg-2: #0d2d59;
      --card: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.22);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.72);
      --gold: #ffd166;
      --green: #3ddc97;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(238,28,46,0.30), transparent 28%),
        radial-gradient(circle at 85% 8%, rgba(61,220,151,0.22), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    .page { padding: 10px 14px; max-width: 1360px; margin: 0 auto; }
    .hero {
      display: grid;
      grid-template-columns: 0.9fr 1.4fr;
      gap: 12px;
      align-items: stretch;
      margin-bottom: 10px;
    }
    .title-card, .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.22);
      backdrop-filter: blur(16px);
    }
    .title-card {
      padding: 12px 16px 10px;
      position: relative;
      overflow: hidden;
      min-height: auto;
    }
    .title-card::after {
      content: "";
      position: absolute;
      inset: -70px -100px auto auto;
      width: 180px;
      height: 180px;
      background: conic-gradient(from 120deg, var(--tesco-red), var(--gold), var(--tesco-blue), var(--tesco-red));
      filter: blur(22px);
      opacity: .24;
      animation: rotateGlow 10s linear infinite;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 6px;
      min-height: 44px;
      position: relative;
      z-index: 1;
    }
    .logo {
      max-width: 210px;
      max-height: 44px;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.18));
    }
    .heading-wrap {
      position: relative;
      z-index: 1;
    }
    .heading-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      margin-bottom: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      color: #dbeafe;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .heading-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--green));
      box-shadow: 0 0 14px rgba(255,209,102,.55);
    }
    .title-main {
      margin: 0;
      font-size: clamp(28px, 3.1vw, 42px);
      letter-spacing: -1.2px;
      line-height: 0.9;
      font-weight: 950;
      text-shadow: 0 8px 24px rgba(0,0,0,.18);
    }
    .title-main .accent {
      display: inline-block;
      background: linear-gradient(90deg, #ffffff, #dbeafe, #ffd166);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      max-width: 420px;
      line-height: 1.3;
    }
    @keyframes rotateGlow { to { transform: rotate(360deg); } }
    .leader-chip {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 8px; padding: 8px 12px;
      border-radius: 999px; background: rgba(255, 209, 102, .17); border: 1px solid rgba(255, 209, 102, .45);
      color: #fff3c4; font-weight: 800; animation: pulse 1.8s ease-in-out infinite;
      font-size: 14px;
      line-height: 1.2;
    }
    .leader-chip strong {
      color: #ffffff;
      font-weight: 950;
      padding: 0 3px;
      text-shadow: 0 0 16px rgba(255,209,102,.35);
    }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); box-shadow: 0 0 24px rgba(255,209,102,.28); } }
    .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .panel { padding: 10px 12px; overflow: hidden; }
    .panel h2 { margin: 0 0 6px; font-size: 18px; }
    .podium-panel { display: block; }
    .podium { display: grid; grid-template-columns: 1fr 1.06fr 1fr; gap: 8px; align-items: end; min-height: 176px; padding-top: 4px; }
    .podium-card {
      border-radius: 14px; padding: 10px 8px; text-align: center; border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.10); transition: .4s ease; animation: riseIn .9s ease both;
    }
    .podium-card.rank-1 { min-height: 176px; background: linear-gradient(180deg, rgba(255,209,102,.35), rgba(255,255,255,.10)); box-shadow: 0 0 36px rgba(255,209,102,.16); }
    .podium-card.rank-2 { min-height: 146px; }
    .podium-card.rank-3 { min-height: 126px; }
    @keyframes riseIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .medal {
      font-size: 32px;
      margin-bottom: 4px;
      filter: drop-shadow(0 0 10px rgba(255, 209, 102, 0.35));
      text-shadow: 0 0 14px rgba(255, 209, 102, 0.28);
    }
    .podium-team { font-weight: 950; font-size: 17px; margin-bottom: 6px; line-height: 1.15; }
    .podium-score { font-size: 28px; font-weight: 950; }
    .score-label { color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: .14em; }
    .leaderboard { display: flex; flex-direction: column; gap: 6px; }
    .row {
      display: grid; grid-template-columns: 56px 1.08fr 2fr 64px; gap: 9px; align-items: center;
      padding: 8px 11px; border-radius: 12px; background: rgba(255,255,255,.09); border: 1px solid rgba(255,255,255,.12);
      animation: slideIn .7s ease both; position: relative; overflow: hidden;
    }
    .row.rank-1 {
      padding: 10px 12px;
      background: linear-gradient(90deg, rgba(255,209,102,.30), rgba(255,255,255,.10));
      border-color: rgba(255,209,102,.55);
      box-shadow: 0 10px 28px rgba(255,209,102,.14);
    }
    .row.rank-2 {
      padding: 9px 12px;
      background: linear-gradient(90deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      border-color: rgba(255,255,255,.28);
    }
    .row.rank-3 {
      padding: 9px 12px;
      background: linear-gradient(90deg, rgba(255,196,120,.18), rgba(255,255,255,.08));
      border-color: rgba(255,196,120,.30);
    }
    .row.rank-1 .rank, .row.rank-2 .rank, .row.rank-3 .rank,
    .row.rank-1 .team-name, .row.rank-2 .team-name, .row.rank-3 .team-name,
    .row.rank-1 .score, .row.rank-2 .score, .row.rank-3 .score {
      font-size: 17px;
    }
    .row.rank-1 .bar-wrap, .row.rank-2 .bar-wrap, .row.rank-3 .bar-wrap {
      height: 11px;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .rank {
      font-size: 16px;
      font-weight: 950;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }
    .team-name { font-size: 14px; font-weight: 850; }
    .bar-wrap { height: 10px; border-radius: 999px; background: rgba(255,255,255,.14); overflow: hidden; }
    .bar { height: 100%; width: 0%; border-radius: inherit; background: linear-gradient(90deg, var(--tesco-blue), var(--green), var(--gold)); transition: width 1.1s cubic-bezier(.2,.9,.1,1); }
    .score { text-align: right; font-size: 16px; font-weight: 950; }
    .rounds { display: none; }
    table { width: 100%; border-collapse: collapse; min-width: 720px; }
    th, td { padding: 12px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,.12); }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .10em; }
    td:first-child, th:first-child { text-align: left; font-weight: 800; }
    .status { color: var(--muted); font-size: 11px; margin-top: 6px; min-height: 14px; }
    .ticker { margin-top: 8px; white-space: nowrap; overflow: hidden; color: rgba(255,255,255,.82); font-size: 12px; }
    .ticker span { display: inline-block; padding-left: 100%; animation: ticker 20s linear infinite; }
    @keyframes ticker { to { transform: translateX(-100%); } }
    .confetti { position: fixed; top: -20px; width: 10px; height: 16px; opacity: .9; animation: fall 5s linear infinite; pointer-events: none; }
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    @media (max-width: 1000px) {
      .hero, .grid { grid-template-columns: 1fr; }
      .row { grid-template-columns: 46px 1fr 1.4fr 54px; }
      .page { padding: 10px; }
    }
  </style>

</head>
<body>
  <div id="confetti"></div>
  <main class="page">
    <section class="hero">
      <div class="title-card">
        <div class="logo-wrap">
          <img src="logo.png" alt="Logo" class="logo" />
        </div>
        <div class="heading-wrap">
          <div class="heading-badge">Live Quiz Event</div>
          <h1 class="title-main">Quiz <span class="accent">Leaderboard</span></h1>
          <div class="subtitle"></div>
        </div>
        <div class="leader-chip" id="leaderChip"></div>
        <div class="ticker"><span id="tickerText"></span></div>
        <div class="status" id="statusText"></div>
      </div>
      <div class="panel podium-panel">
        <h2>Top 3 Podium</h2>
        <div class="podium" id="podium"></div>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Current Standings</h2>
        <div class="leaderboard" id="leaderboard"></div>
      </div>
    </section>
  </main>

  <script>
    const REFRESH_MS = 10000; // 10s polling, same as the Java/Python backend versions

    let previousLeader = null;

    function medal(rank) { return rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '#'; }

    async function loadData() {
      // Same endpoint contract as the Python server: GET /data -> JSON
      const response = await fetch('/data?ts=' + Date.now(), { cache: 'no-store' });
      const data = await response.json();
      if (!response.ok || data.error) throw new Error(data.error || 'Unable to load Excel data');
      return data;
    }

    function render(data) {
      const rows = data.teams || [];
      const maxScore = Math.max(...rows.map(r => Number(r.total) || 0), 1);
      const leader = rows[0] || { team: '-', total: 0 };

      document.getElementById('leaderChip').innerHTML = `🏆 Leading now: <strong>${leader.team}</strong> with <strong>${leader.total}</strong> points`;

      if (previousLeader && previousLeader !== leader.team) {
        flashLeaderChange(leader.team);
      }
      previousLeader = leader.team;

      const podiumOrder = [rows[1], rows[0], rows[2]].filter(Boolean);
      document.getElementById('podium').innerHTML = podiumOrder.map(r => `
        <div class="podium-card rank-${r.rank}">
          <div class="medal">${medal(r.rank)}</div>
          <div class="podium-team">${r.team}</div>
          <div class="score-label">Score</div>
          <div class="podium-score">${r.total}</div>
        </div>`).join('');

      document.getElementById('leaderboard').innerHTML = rows.map((r, i) => `
        <div class="row rank-${r.rank}" style="animation-delay:${i * 45}ms">
          <div class="rank">${r.rank}</div>
          <div class="team-name">${r.team}</div>
          <div class="bar-wrap"><div class="bar" style="width:${(Number(r.total) / maxScore) * 100}%"></div></div>
          <div class="score">${r.total}</div>
        </div>`).join('');

      document.getElementById('statusText').textContent = '';
    }

    function flashLeaderChange(team) {
      const chip = document.getElementById('leaderChip');
      chip.style.background = 'rgba(61,220,151,.34)';
      chip.style.borderColor = 'rgba(61,220,151,.8)';
      setTimeout(() => {
        chip.style.background = 'rgba(255, 209, 102, .17)';
        chip.style.borderColor = 'rgba(255, 209, 102, .45)';
      }, 1800);
    }

    async function refresh() {
      try {
        const data = await loadData();
        render(data);
      } catch (error) {
        document.getElementById('statusText').textContent = 'Error: ' + error.message;
      }
    }

    function makeConfetti() {
      const colors = ['#ffd166', '#ee1c2e', '#3ddc97', '#ffffff', '#00539f'];
      const root = document.getElementById('confetti');
      for (let i = 0; i < 42; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[i % colors.length];
        piece.style.animationDelay = Math.random() * 5 + 's';
        piece.style.animationDuration = 3.5 + Math.random() * 4 + 's';
        root.appendChild(piece);
      }
    }

    makeConfetti();
    refresh();
    setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
