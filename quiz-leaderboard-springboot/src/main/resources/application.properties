# Same port the Python version used (http://localhost:8000)
server.port=8000

# Spring Boot's embedded Tomcat binds to all interfaces (0.0.0.0) by default,
# so this is already reachable from other machines on your LAN at
# http://<your-lan-ip>:8000 - no extra binding config needed, unlike raw
# Flask/http.server where you have to remember host='0.0.0.0' explicitly.

# Path to the Excel workbook, resolved relative to the folder you run the
# jar from (mirrors the Python script's "same folder" behaviour).
# Override at runtime with: --quiz.excel.path=/some/other/path.xlsx
quiz.excel.path=./Premium_Quiz_Master_Dashboard.xlsx
quiz.excel.sheet=Score Entry
